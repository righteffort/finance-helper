name: CI (Node)

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths: &paths
      - 'node/**'
      - '*-templates/**'
      - '*-testdata/**'
      - '.github/workflows/ci-node.yml'
  pull_request:
    branches: [main]
    paths: *paths
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node/fidelity-helper

    strategy:
      matrix:
        node-version: [20, 22, 24, 26]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint and build
        run: yarn lint && yarn type-check

      - name: Format
        run: yarn prettier

      - name: Test
        run: yarn test run

  check:
    name: Node CI passed
    if: always()

    needs:
      - test

    runs-on: ubuntu-latest

    steps:
      - name: Decide whether all matrix legs passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

name: CI (Node)

on:
  push:
    branches: [main]
    paths: &paths
      - 'node/**'
      - '*-templates/**'
      - '*-testdata/**'
      - '.github/workflows/ci-node.yml'
  pull_request:
    branches: [main]
    paths: *paths
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node/fidelity-helper

    strategy:
      matrix:
        node-version: [20, 22, 24, 26]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint and build
        run: yarn lint && yarn type-check

      - name: Format
        run: yarn prettier

      - name: Test
        run: yarn test run

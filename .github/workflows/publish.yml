name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fidelity-helper

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Install node dependencies
        run: |
          cd node/fidelity-helper
          yarn install --immutable

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Bump version numbers
        id: version
        run: echo "value=$(scripts/bump_version.py node/fidelity-helper/package.json python/fidelity-helper/pyproject.toml)" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          gh auth setup-git
          git config user.name "righteffort-release[bot]"
          git config user.email "${{ vars.RELEASE_APP_USER_ID }}+righteffort-release[bot]@users.noreply.github.com"
          git add node/*/package.json python/*/pyproject.toml
          git commit -m "chore: release ${{ steps.version.outputs.value }}"
          git tag -m "v${{ steps.version.outputs.value }}" "v${{ steps.version.outputs.value }}"
          git push --follow-tags
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Build Python package
        run: |
          cd python/fidelity-helper
          uv build

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/fidelity-helper/dist/

      - name: Build and publish Node package
        run: |
          cd node/fidelity-helper
          yarn package
          npm publish --provenance --access public package.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            --title "v${{ steps.version.outputs.value }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
